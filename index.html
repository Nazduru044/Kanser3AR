<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Kanser Farkındalık AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Başlat Ekranı - Kamera izni için bu buton ŞART */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        #start-button {
            padding: 20px 50px; font-size: 22px; background: #e91e63;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 0 20px rgba(233, 30, 99, 0.5);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-button">AR DENEYİMİNİ BAŞLAT</button>
        <p style="margin-top: 20px; opacity: 0.8;">Lütfen kamera izni verin.</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./kanser/kanser.mind; autoStart: false; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, antialias: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="kanserVideo" 
                   src="./kanser/kanser.mp4" 
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
            <audio id="kanserSes" src="./kanser/kanser.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#kanserVideo" 
                     width="1" 
                     height="0.6" 
                     position="0 0 0" 
                     material="shader: flat; transparent: true; opacity: 1">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const overlay = document.querySelector('#start-overlay');
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector('#kanserVideo');
        const audio = document.querySelector('#kanserSes');
        const target = document.querySelector('#target');

        startButton.addEventListener('click', () => {
            overlay.classList.add('hidden');
            
            // 1. Kamera sistemini başlat (Bu komut kamera izni ister)
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            // 2. Video ve Ses kilitlerini kaldır
            video.play().then(() => video.pause());
            audio.play().then(() => audio.pause());
            
            console.log("Sistem başlatıldı.");
        });

        // Hedef takibi
        target.addEventListener("targetFound", () => {
            console.log("Resim bulundu!");
            video.play();
            audio.play();
        });

        target.addEventListener("targetLost", () => {
            video.pause();
            audio.pause();
        });
    </script>
</body>
</html>
