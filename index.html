<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Kanser Farkındalık AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Başlangıç Ekranı */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        #start-button {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background-color: #ff4757; color: white;
            border: none; border-radius: 30px; cursor: pointer;
            margin-bottom: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">DENEYİMİ BAŞLAT</button>
        <p>Kamera izni verin ve<br>görseli kameraya tutun.</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./kanser/kanser.mind; autoStart: false;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="kanserVideo" src="./kanser/kanser.mp4" preload="auto" loop="true" muted="true" playsinline webkit-playsinline></video>
            <audio id="kanserSes" src="./kanser/kanser.mp3" preload="auto" loop="true"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#kanserVideo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const startScreen = document.querySelector('#start-screen');
        const video = document.querySelector('#kanserVideo');
        const audio = document.querySelector('#kanserSes');
        const sceneEl = document.querySelector('a-scene');
        const target = document.querySelector('#target');

        // Başlat butonuna basıldığında
        startButton.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            
            // AR Sistemini başlat
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start();

            // Ses ve videoyu tarayıcıya tanıt (play/pause yaparak kilitlerini açıyoruz)
            video.play().then(() => video.pause());
            audio.play().then(() => audio.pause());
        });

        // Hedef bulunduğunda video ve sesi aynı anda başlat
        target.addEventListener("targetFound", () => {
            video.play();
            audio.play();
        });

        // Hedef kaybedildiğinde durdur
        target.addEventListener("targetLost", () => {
            video.pause();
            audio.pause();
        });
    </script>
</body>
</html>
