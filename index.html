<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Kanser AR Projesi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; background: #e91e63; color: white;
            border: none; border-radius: 50px; z-index: 10000; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="start-btn">SİSTEMİ BAŞLAT</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./kanser/kanser.mind; autoStart: false; uiScanning: no;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="kanserVideo" src="./kanser/kanser.mp4" 
                   preload="auto" loop="true" muted="true" 
                   playsinline webkit-playsinline crossorigin="anonymous"></video>
            <audio id="kanserSes" src="./kanser/kanser.mp3" preload="auto" loop="true" crossorigin="anonymous"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#kanserVideo" width="1" height="0.6" material="shader: flat;"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#start-btn');
        const video = document.querySelector('#kanserVideo');
        const audio = document.querySelector('#kanserSes');
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            btn.classList.add('hidden');
            
            // Kamera izni iste ve AR'ı başlat
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            // Video ve Sesi hazırla
            video.play(); video.pause();
            audio.play(); audio.pause();
        });

        const target = document.querySelector('#target');
        target.addEventListener("targetFound", () => {
            video.play();
            audio.play();
        });

        target.addEventListener("targetLost", () => {
            video.pause();
            audio.pause();
        });
    </script>
</body>
</html>
